```html id="fullsystem1"
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Showroom Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    background: black;
}

/* Controls */
.controls {
    text-align: center;
    padding: 15px;
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

/* Cards */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 260px;
    margin: 10px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3 {
    text-align: center;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #222;
    margin: 10% auto;
    padding: 20px;
    width: 80%;
    max-width: 500px;
}

/* Admin */
.admin {
    background: #111;
    padding: 15px;
    text-align: center;
}
</style>
</head>

<body>

<header>BMW Showroom PRO</header>

<div class="controls">
    <input type="text" id="search" placeholder="Araç ara...">
    <select id="filter">
        <option value="all">Tümü</option>
        <option value="Sedan">Sedan</option>
        <option value="SUV">SUV</option>
    </select>
</div>

<div class="container" id="carList"></div>

<!-- ADMIN PANEL -->
<div class="admin">
    <h3>Araç Ekle</h3>
    <input id="name" placeholder="Araç adı">
    <input id="category" placeholder="Kategori (Sedan/SUV)">
    <input id="img" placeholder="Görsel URL">
    <input id="specs" placeholder="Teknik özellikler">
    <button onclick="addCar()">Ekle</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="mTitle"></h2>
        <img id="mImg" style="width:100%">
        <p id="mSpecs"></p>
        <button onclick="closeModal()">Kapat</button>
    </div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [
    {
        name: "BMW 3 Serisi",
        category: "Sedan",
        img: "https://www.bmw.com/content/dam/bmw/common/all-models/3-series/sedan/2022/highlights/bmw-3-series.jpg",
        specs: "184 HP - 2.0L Turbo"
    },
    {
        name: "BMW X5",
        category: "SUV",
        img: "https://www.bmw.com/content/dam/bmw/common/all-models/x-series/x5.jpg",
        specs: "340 HP - 3.0L"
    }
];

function save() {
    localStorage.setItem("cars", JSON.stringify(cars));
}

function render() {
    let list = document.getElementById("carList");
    list.innerHTML = "";

    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;

    cars
    .filter(c => c.name.toLowerCase().includes(search))
    .filter(c => filter === "all" || c.category === filter)
    .forEach(c => {
        list.innerHTML += `
        <div class="card" onclick="openModal('${c.name}','${c.img}','${c.specs}')">
            <img src="${c.img}">
            <h3>${c.name}</h3>
        </div>`;
    });
}

function addCar() {
    let car = {
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        img: document.getElementById("img").value,
        specs: document.getElementById("specs").value
    };
    cars.push(car);
    save();
    render();
}

function openModal(title, img, specs) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("mTitle").innerText = title;
    document.getElementById("mImg").src = img;
    document.getElementById("mSpecs").innerText = specs;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

document.getElementById("search").oninput = render;
document.getElementById("filter").onchange = render;

render();
</script>

</body>
</html>
